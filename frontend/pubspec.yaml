name: frontend
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  # api
  http: ^1.6.0
  shared_preferences: ^2.3.3
  dotted_border: ^2.1.0
  image_picker: ^1.1.2

  intl: ^0.19.0
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  supabase_flutter: ^2.4.0
  flutter_dotenv: ^5.1.0
  responsive_sizer: ^3.3.1
  flutter:
    sdk: flutter

  # homepage
  calendar_date_picker2: ^3.0.0
  geolocator: ^13.0.1 # Get Coord GPS
  geocoding: ^3.0.0 # Coord to address
  flutter_map: ^7.0.2 # Widget maps
  latlong2: ^0.9.1
  permission_handler: ^11.3.1 # GPS permission
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/videos/
    - assets/images/hotel/
    - assets/images/logo.png
    - assets/images/profile-photo.jpg
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/Plus_Jakarta_Sans/static/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/Plus_Jakarta_Sans/static/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/Plus_Jakarta_Sans/static/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Plus_Jakarta_Sans/static/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/Plus_Jakarta_Sans/static/PlusJakartaSans-ExtraBold.ttf
          weight: 800

linter:
  rules:
    - prefer_relative_imports: false
    - always_use_package_imports: true # auto import 'package:...'
